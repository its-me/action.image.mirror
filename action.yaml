name: Cross-registry image mirror
description: Copy each of a set of tags from one image repository to another via `docker buildx imagetools create`.
author: Sergey Kanafyev

branding:
  icon: copy
  color: blue

inputs:
  source:
    description: Source image repository, e.g. "ghcr.io/its-me/workflow".
    required: true
  source-registry:
    description: Registry hostname to log in to for the source image, e.g. "ghcr.io". Leave unset to log in to Docker Hub.
    required: false
    default: ""
  source-username:
    description: Username for logging in to the source registry.
    required: true
  source-password:
    description: Password or token for logging in to the source registry.
    required: true
  destination:
    description: Destination image repository, e.g. "1tsme/workflow" or "quay.io/itsme/workflow".
    required: true
  destination-registry:
    description: Registry hostname to log in to for the destination image, e.g. "quay.io". Leave unset to log in to Docker Hub.
    required: false
    default: ""
  destination-username:
    description: Username for logging in to the destination registry.
    required: true
  destination-password:
    description: Password or token for logging in to the destination registry.
    required: true
  tags:
    description: Whitespace-separated list of tag names to copy from source to destination.
    required: true

runs:
  using: composite
  steps:
    - name: Log in to source registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ${{ inputs.source-registry }}
        username: ${{ inputs.source-username }}
        password: ${{ inputs.source-password }}

    - name: Log in to destination registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ${{ inputs.destination-registry }}
        username: ${{ inputs.destination-username }}
        password: ${{ inputs.destination-password }}

    - name: Mirror image
      shell: bash
      env:
        SOURCE: ${{ inputs.source }}
        DESTINATION: ${{ inputs.destination }}
        TAGS: ${{ inputs.tags }}
      run: |
        for tag in $TAGS; do
          docker buildx imagetools create \
            --tag "$DESTINATION:$tag" \
            "$SOURCE:$tag"
        done
